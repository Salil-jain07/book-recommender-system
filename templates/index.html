<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    body {
        background: #121212;
        font-family: Arial, sans-serif;
    }

    .text-white {
        color: white;
    }

    .navbar {
        background: linear-gradient(90deg, #02b361, #028f4d);
        padding: 12px 20px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    .navbar-brand {
        color: white;
        font-size: 24px;
        font-weight: bold;
    }

    .nav-link-custom {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-weight: 500;
    }

    .nav-link-custom:hover {
        color: #ffd54f;
    }

    .book-card {
        margin-top: 30px;
    }

    .card {
        background: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        min-height: 520px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: translateY(-8px);
    }

    .card-img-wrapper {
        background: white;
        padding: 10px;
        border-radius: 8px;
    }

    .card img {
        width: 100%;
        height: 320px;
        object-fit: contain;
    }

    .book-title {
        font-size: 16px;
        font-weight: bold;
        margin-top: 15px;
        color: #222;
    }

    .author {
        color: #555;
        font-size: 14px;
    }

    .meta {
        color: #777;
        font-size: 13px;
    }

    h1 {
        font-weight: bold;
        margin-top: 20px;
        margin-bottom: 10px;
    }
</style>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand"> My Book Recommender</a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a href="/" class="nav-link-custom">Home</a>
            </li>
            <li class="nav-item">
                <a href="/recommend" class="nav-link-custom">Recommend</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link-custom">👨‍💻 By Salil Jain</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-12">
            <h1 class="text-white">Top 50 Books</h1>
        </div>

        {% for i in range(book_name|length) %}
        <div class="col-md-3 book-card">
            <div class="card">
                <div class="card-body text-center">

                    <div class="card-img-wrapper">
                        <img class="card-img-top" src="{{ image[i] }}">
                    </div>

                    <p class="book-title">{{ book_name[i] }}</p>
                    <p class="author">{{ author[i] }}</p>
                    <p class="meta">Votes: {{ votes[i] }}</p>
                    <p class="meta">Rating: {{ rating[i] }}</p>

                </div>
            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
