<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
   .text-white {
        color: white;
    }

    .book-card {
        margin-top: 30px;
    }

    .card {
        padding: 10px;
        min-height: 450px;
    }

    .card-img-wrapper {
        background: white;
        padding: 3px;
        border-radius: 5px;
    }

    .card img {
        width: 100%;
        height: 320px;
        object-fit: contain;
    }
</style>

<body style="background-color: black;">

<nav class="navbar navbar-expand-lg" style="background-color:#02b361;">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="/">My Book Recommender</a>

        <ul class="navbar-nav">
            <li class="nav-item">
                <a href="/" class="nav-link text-white">Home</a>
            </li>
            <li class="nav-item">
                <a href="/recommend" class="nav-link text-white">Recommend</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link text-white">Contact</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="row">

        <div class="col-md-12 mt-4">
            <h1 class="text-white" style="font-size: 50px;">Recommend Books</h1>

            <form action="/recommend_books" method="POST">
                <input
                    name="user_input"
                    type="text"
                    class="form-control"
                    placeholder="Enter book name..."
                    required
                >
                <br>
                <input type="submit" class="btn btn-lg btn-warning" value="Recommend">
            </form>

            {% if error %}
            <div class="alert alert-danger mt-3">
                {{ error }}
            </div>
            {% endif %}
        </div>

        {% if data %}
            {% for i in data %}
            <div class="col-md-3 book-card">
                <div class="card">
                    <div class="card-body text-center">
                        <img class="card-img-top" src="{{ i[2] }}">
                        <p class="mt-2"><strong>{{ i[0] }}</strong></p>
                        <h6>By - {{ i[1] }}</h6>
                    </div>
                </div>
            </div>
            {% endfor %}
        {% endif %}

    </div>
</div>

</body>
</html>
